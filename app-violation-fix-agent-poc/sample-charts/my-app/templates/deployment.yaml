apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    chart: {{ .Chart.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      chart: {{ .Chart.Name }}
  template:
    metadata:
      labels:
        chart: {{ .Chart.Name }}
        # intentional violations: missing required labels 'app' and 'env'
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "{{ .Values.resources.requests.cpu }}"
              memory: "{{ .Values.resources.requests.memory }}"
            limits:
              cpu: "{{ .Values.resources.limits.cpu }}"
              memory: "{{ .Values.resources.limits.memory }}"
          # intentional violations:
          #   - no securityContext (runAsNonRoot, allowPrivilegeEscalation)
          #   - no topologySpreadConstraints
          #   - resource limits exceed 2x requests (see values.yaml)
