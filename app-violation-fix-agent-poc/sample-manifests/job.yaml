apiVersion: batch/v1
kind: Job
metadata:
  name: sample-batch-job
spec:
  template:
    metadata:
      labels:
        task: data-processing
        # intentional violations: missing required labels 'app' and 'env'
    spec:
      restartPolicy: Never
      containers:
        - name: worker
          image: busybox:latest
          command: ["sh", "-c", "echo 'Processing data...' && sleep 5"]
          # intentional violations:
          #   - image uses ':latest' tag
          #   - no resources.limits (cpu, memory)
          #   - no securityContext (runAsNonRoot, allowPrivilegeEscalation)
