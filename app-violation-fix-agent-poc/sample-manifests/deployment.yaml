apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-app
  labels:
    app: sample-app
    env: dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sample-app
  template:
    metadata:
      labels:
        app: sample-app
        env: dev
    spec:
      containers:
        - name: sample-app
          image: nginx:1.25.3
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"    # intentional violation: 5x cpu request (max allowed: 200m)
              memory: "512Mi" # intentional violation: 4x memory request (max allowed: 256Mi)
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
      # intentional violations:
      #   - no topologySpreadConstraints (pods not spread across nodes)
      #   - cpu and memory limits exceed 2x their corresponding requests
