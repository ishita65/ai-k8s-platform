# TLS origination rule for the Istio sidecar on agent pods.
#
# When an agent pod calls http://<gateway-service>:443, the Istio sidecar
# intercepts the outbound TCP connection on port 443 and upgrades it to TLS
# (SIMPLE mode) before forwarding to the Envoy Gateway. The agent's Python code
# uses a plain http:// URL — TLS is transparent at the sidecar layer.
#
# The sidecar verifies the server cert against Istio's root CA cert, which is
# automatically mounted in every injected pod at /var/run/secrets/istio/root-cert.pem.
# The server cert is generated by templates/istio/gen-gateway-cert.sh.
#
# portLevelSettings restricts TLS origination to port 443 only, so existing
# agents that call the original http/80 gateway are not affected.
#
# Apply:
#   kubectl apply -f templates/istio/destination-rule.yaml
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: envoy-gateway-tls-origination
  namespace: default
spec:
  # Wildcard covers the hash-suffixed service name Envoy Gateway generates
  # (e.g. envoy-default-envoy-ai-gateway-istio-<hash>.envoy-gateway-system.svc.cluster.local).
  host: "*.envoy-gateway-system.svc.cluster.local"
  trafficPolicy:
    portLevelSettings:
      - port:
          number: 443
        tls:
          # SIMPLE = one-way TLS: sidecar verifies the server cert but presents
          # no client certificate. Traffic is encrypted; no mTLS client identity.
          mode: SIMPLE
          caCertificates: /var/run/secrets/istio/root-cert.pem
