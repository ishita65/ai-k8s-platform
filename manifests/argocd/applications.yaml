metadata:
  name: redis
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: ai-k8s-platform
    component: cache
spec:
  project: platform
  source:
    repoURL: https://github.com/example/ai-k8s-platform
    targetRevision: HEAD
    path: templates/redis
  destination:
    server: https://kubernetes.default.svc
    namespace: redis-system
  syncPolicy:
