---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mcp-server
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: ai-k8s-platform
    component: mcp
spec:
  project: platform
  source:
    repoURL: https://github.com/example/ai-k8s-platform
    targetRevision: HEAD
    path: templates/mcp-server
  destination:
