# OpenAI API key for the fallback-agent BackendSecurityPolicy.
# Replace the placeholder with your real key before applying.
#
# Apply before openai-gateway.yaml:
#   kubectl apply -f manifests/fallback-agent/openai-secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: fallback-agent-openai
  namespace: default
type: Opaque
stringData:
  apiKey: "<YOUR_OPENAI_API_KEY>"
